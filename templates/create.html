<!DOCTYPE html>
<html lang="en">
<head>
  <title>Create Ticket</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>

<body class="bg-slate-50 min-h-screen">

  <nav class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <span class="text-lg font-bold text-slate-800">SupportDesk</span>
    </div>
    <a href="/" class="text-sm text-slate-500 hover:text-slate-700 font-medium transition">
      ← Back to Tickets
    </a>
  </nav>

  <div class="max-w-2xl mx-auto px-8 py-10">

    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-800">Create New Ticket</h1>
      <p class="text-slate-500 text-sm mt-1">Fill in the details below to submit a support request</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">

      <form method="POST" class="space-y-5">

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Customer Name</label>
          <input
            name="customer_name"
            placeholder="e.g. Jane Smith"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Customer Email</label>
          <input
            name="customer_email"
            type="email"
            placeholder="e.g. jane@example.com"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Subject</label>
          <input
            name="subject"
            placeholder="Brief description of the issue"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            required
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Priority</label>
          <select
            name="priority"
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description</label>
          <textarea
            name="description"
            placeholder="Provide as much detail as possible..."
            class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
            rows="5"
            required
          ></textarea>
        </div>

        <div class="flex gap-3 pt-2">
          <button
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition shadow-sm"
          >
            Submit Ticket
          </button>
          <a href="/"
             class="border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-medium px-6 py-2.5 rounded-lg transition flex items-center">
            Cancel
          </a>
        </div>

      </form>

    </div>
  </div>

</body>
</html>
